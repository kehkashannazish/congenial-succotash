<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flipkart Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <div class="logo">Flipkart</div>
  <input type="text" placeholder="Search products..." id="searchBox">
  <button onclick="searchProduct()">Search</button>
  <div class="cart">🛒 Cart: <span id="cartCount">0</span></div>
</header>

<!-- BANNER -->
<section class="banner">
  <h1>Big Billion Days Sale!</h1>
</section>

<!-- PRODUCTS -->
<section class="products" id="productContainer">
</section>

<script src="script.js"></script>
</body>
</html>
